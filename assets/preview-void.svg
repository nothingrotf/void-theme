<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      .ln { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; fill: #6e6d62; text-anchor: end; }
      .ln-a { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; fill: #ededed; text-anchor: end; }
      .c { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
      .kw { fill: #f75f8f; }
      .s { fill: #62c073; }
      .f { fill: #c472fb; }
      .t { fill: #c472fb; }
      .n { fill: #52a8ff; }
      .b { fill: #52a8ff; }
      .p { fill: #52a8ff; }
      .cm { fill: #758575; font-style: italic; }
      .pm { fill: #ff9907; }
      .o { fill: #f75f8f; }
      .x { fill: #ededed; }
      .tl { fill: #1da9b0; }
      .tt { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; fill: #6e6d62; text-anchor: middle; }
    </style>
    <clipPath id="code-area">
      <rect x="0" y="36" width="800" height="444" rx="0"/>
    </clipPath>
    <clipPath id="frame">
      <rect width="800" height="480" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
