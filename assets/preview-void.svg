    <rect width="800" height="480" fill="#000000"/>

    <!-- Title bar -->
    <line x1="0" y1="36" x2="800" y2="36" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="400" y="22" class="tt">server.ts</text>

    <!-- Gutter separator -->
    <line x1="48" y1="36" x2="48" y2="480" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Active line highlight (line 10) -->
    <rect x="0" y="216" width="800" height="20" fill="#ffffff06"/>

    <g clip-path="url(#code-area)">
      <!-- Line numbers: y = 36 + (lineNum - 1) * 20 + 16 -->
      <text x="40" y="52" class="ln">1</text>
      <text x="40" y="72" class="ln">2</text>
      <text x="40" y="92" class="ln">3</text>
      <text x="40" y="112" class="ln">4</text>
      <text x="40" y="132" class="ln">5</text>
      <text x="40" y="152" class="ln">6</text>
