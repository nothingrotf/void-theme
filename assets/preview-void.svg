      <text x="40" y="192" class="ln">8</text>
      <text x="40" y="212" class="ln">9</text>
      <text x="40" y="232" class="ln-a">10</text>
      <text x="40" y="252" class="ln">11</text>
      <text x="40" y="272" class="ln">12</text>
      <text x="40" y="292" class="ln">13</text>
      <text x="40" y="312" class="ln">14</text>
      <text x="40" y="332" class="ln">15</text>
      <text x="40" y="352" class="ln">16</text>
      <text x="40" y="372" class="ln">17</text>
      <text x="40" y="392" class="ln">18</text>
      <text x="40" y="412" class="ln">19</text>
      <text x="40" y="432" class="ln">20</text>
      <text x="40" y="452" class="ln">21</text>
      <text x="40" y="472" class="ln">22</text>

      <!-- Line 1: import { createServer } from "node:http" -->
      <text y="52" class="c"><tspan x="60" class="kw">import</tspan><tspan class="x"> { </tspan><tspan class="f">createServer</tspan><tspan class="x"> } </tspan><tspan class="kw">from</tspan><tspan class="x"> </tspan><tspan class="s">"node:http"</tspan></text>

      <!-- Line 2: empty -->

      <!-- Line 3: interface Config { -->
      <text y="92" class="c"><tspan x="60" class="kw">interface</tspan><tspan class="x"> </tspan><tspan class="t">Config</tspan><tspan class="x"> {</tspan></text>

      <!-- Line 4:   port: number -->
      <text y="112" class="c"><tspan x="60" class="x">  </tspan><tspan class="p">port</tspan><tspan class="x">: </tspan><tspan class="t">number</tspan></text>

      <!-- Line 5:   host: string -->
      <text y="132" class="c"><tspan x="60" class="x">  </tspan><tspan class="p">host</tspan><tspan class="x">: </tspan><tspan class="t">string</tspan></text>

      <!-- Line 6:   debug?: boolean -->
      <text y="152" class="c"><tspan x="60" class="x">  </tspan><tspan class="p">debug</tspan><tspan class="x">?: </tspan><tspan class="t">boolean</tspan></text>

      <!-- Line 7: } -->
      <text y="172" class="c"><tspan x="60" class="x">}</tspan></text>

      <!-- Line 8: empty -->

      <!-- Line 9: // Start the development server -->
      <text y="212" class="c"><tspan x="60" class="cm">// Start the development server</tspan></text>

      <!-- Line 10: const config: Config = { -->
      <text y="232" class="c"><tspan x="60" class="kw">const</tspan><tspan class="x"> config: </tspan><tspan class="t">Config</tspan><tspan class="x"> </tspan><tspan class="o">=</tspan><tspan class="x"> {</tspan></text>

      <!-- Line 11:   port: 3000, -->
      <text y="252" class="c"><tspan x="60" class="x">  </tspan><tspan class="p">port</tspan><tspan class="x">: </tspan><tspan class="n">3000</tspan><tspan class="x">,</tspan></text>

      <!-- Line 12:   host: "localhost", -->
      <text y="272" class="c"><tspan x="60" class="x">  </tspan><tspan class="p">host</tspan><tspan class="x">: </tspan><tspan class="s">"localhost"</tspan><tspan class="x">,</tspan></text>

      <!-- Line 13:   debug: true, -->
      <text y="292" class="c"><tspan x="60" class="x">  </tspan><tspan class="p">debug</tspan><tspan class="x">: </tspan><tspan class="b">true</tspan><tspan class="x">,</tspan></text>

      <!-- Line 14: } -->
      <text y="312" class="c"><tspan x="60" class="x">}</tspan></text>

      <!-- Line 15: empty -->

      <!-- Line 16: async function startServer(cfg: Config) { -->
      <text y="352" class="c"><tspan x="60" class="kw">async</tspan><tspan class="x"> </tspan><tspan class="kw">function</tspan><tspan class="x"> </tspan><tspan class="f">startServer</tspan><tspan class="x">(</tspan><tspan class="pm">cfg</tspan><tspan class="x">: </tspan><tspan class="t">Config</tspan><tspan class="x">) {</tspan></text>

      <!-- Line 17:   const server = createServer((req, res) => { -->
      <text y="372" class="c"><tspan x="60" class="x">  </tspan><tspan class="kw">const</tspan><tspan class="x"> server </tspan><tspan class="o">=</tspan><tspan class="x"> </tspan><tspan class="f">createServer</tspan><tspan class="x">((</tspan><tspan class="pm">req</tspan><tspan class="x">, </tspan><tspan class="pm">res</tspan><tspan class="x">) </tspan><tspan class="o">=&gt;</tspan><tspan class="x"> {</tspan></text>

      <!-- Line 18:     res.writeHead(200, { "Content-Type": "text/plain" }) -->
      <text y="392" class="c"><tspan x="60" class="x">    </tspan><tspan class="pm">res</tspan><tspan class="x">.</tspan><tspan class="f">writeHead</tspan><tspan class="x">(</tspan><tspan class="n">200</tspan><tspan class="x">, { </tspan><tspan class="s">"Content-Type"</tspan><tspan class="x">: </tspan><tspan class="s">"text/plain"</tspan><tspan class="x"> })</tspan></text>

      <!-- Line 19:     res.end(`Running on ${cfg.host}:${cfg.port}`) -->
      <text y="412" class="c"><tspan x="60" class="x">    </tspan><tspan class="pm">res</tspan><tspan class="x">.</tspan><tspan class="f">end</tspan><tspan class="x">(</tspan><tspan class="tl">`Running on ${</tspan><tspan class="pm">cfg</tspan><tspan class="x">.</tspan><tspan class="p">host</tspan><tspan class="tl">}:${</tspan><tspan class="pm">cfg</tspan><tspan class="x">.</tspan><tspan class="p">port</tspan><tspan class="tl">}`</tspan><tspan class="x">)</tspan></text>

      <!-- Line 20:   }) -->
      <text y="432" class="c"><tspan x="60" class="x">  })</tspan></text>

      <!-- Line 21: empty -->

      <!-- Line 22:   server.listen(cfg.port, cfg.host) -->
      <text y="452" class="c"><tspan x="60" class="x">  server.</tspan><tspan class="f">listen</tspan><tspan class="x">(</tspan><tspan class="pm">cfg</tspan><tspan class="x">.</tspan><tspan class="p">port</tspan><tspan class="x">, </tspan><tspan class="pm">cfg</tspan><tspan class="x">.</tspan><tspan class="p">host</tspan><tspan class="x">)</tspan></text>

      <!-- Line 23:   console.log(`Server ready...`) -->
      <text y="472" class="c"><tspan x="60" class="x">  console.</tspan><tspan class="f">log</tspan><tspan class="x">(</tspan><tspan class="tl">`Server ready at http://${</tspan><tspan class="pm">cfg</tspan><tspan class="x">.</tspan><tspan class="p">host</tspan><tspan class="tl">}:${</tspan><tspan class="pm">cfg</tspan><tspan class="x">.</tspan><tspan class="p">port</tspan><tspan class="tl">}`</tspan><tspan class="x">)</tspan></text>
